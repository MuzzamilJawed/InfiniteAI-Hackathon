[pytest]
testpaths = tests
python_files = test_*.py
python_classes = Test*
python_functions = test_*
filterwarnings =
    ignore::DeprecationWarning
    ignore::PendingDeprecationWarning
    ignore::UserWarning
markers =
    slow: long-running ML accuracy benchmarks (run with `-m slow`)
addopts =
    -ra
    --tb=short
    --strict-markers
